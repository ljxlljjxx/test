name: CI for walawala.c

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Compile walawala.c
        run: gcc -Wall -Wextra -o walawala walawala.c

      - name: Run tests
        run: |
          # 定义测试用例：输入 预期输出
          echo "5 10" > tests.txt
          echo "0 0" >> tests.txt
          echo "-3 -6" >> tests.txt
          echo "100 200" >> tests.txt
          echo "1 2" >> tests.txt
          
          # 逐个测试
          while read input expected; do
            output=$(./walawala $input)
            if [ "$output" -eq "$expected" ]; then
              echo "✅ Input $input -> $output (PASS)"
            else
              echo "❌ Input $input -> $output, expected $expected (FAIL)"
              exit 1
            fi
          done < tests.txt
