name: test1
run-name: test1 triggered bt ${{ github.actor }}
on:
  label:
    types:
      - created
      - edited
      - deleted
  push:
    branches:
      - main
  schedule:
    - cron: "14 1 * * *"
jobs:
  greeting-bash:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - run: echo Hi, ${{ github.actor }}

  greeting-powershell:
    runs-on: windows-latest
    steps:
      - run: echo Hi, ${{ github.actor }}

  checkout_code:
    if: ${{ always() }}
    needs: [greeting-bash, greeting-powershell]
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
  
  comiple-ubuntu:
    needs: checkout_code
    name: Comiple in ubuntu
    runs-on: ubuntu-latest
    steps:
      - name: Comiple code
        run: gcc -Wall -Wextra walawala.c -o walawala_ubuntu
  comiple-macos:
    needs: checkout_code
    name: Comiple in macOS
    runs-on: macos-latest
    steps:
      - name: Comiple code
        run: gcc -Wall -Wextra walawala.c -o walawala_macos
  comiple-windows:
    needs: checkout_code
    name: Comiple in windows
    runs-on: windows-latest
    steps:
      - name: Comiple code
        run: gcc -Wall -Wextra walawala.c -o walawala_windows

  test-ubuntu:
    needs: comiple-ubuntu
    runs-on: ${{ matrix.os }}
    steps:
      - name: Run test1
        run: echo "5" | ./walawala_ubuntu | grep -q "10" && echo "Accepted" || (echo "Unaccepted"; exit 1)
      - name: Run test2
        run: echo "0" | ./walawala_ubuntu | grep -q "0" && echo "Accepted" || (echo "Unaccepted"; exit 1)
      - name: Run test3
        run: echo "-1243" | ./walawala_ubuntu | grep -q "-2486" && echo "Accepted" || (echo "Unaccepted"; exit 1)
  test-macos:
    needs: comiple-macos
    runs-on: ${{ matrix.os }}
    steps:
      - name: Run test1
        run: echo "5" | ./walawala_macos | grep -q "10" && echo "Accepted" || (echo "Unaccepted"; exit 1)
      - name: Run test2
        run: echo "0" | ./walawala_macos | grep -q "0" && echo "Accepted" || (echo "Unaccepted"; exit 1)
      - name: Run test3
        run: echo "-1243" | ./walawala_macos | grep -q "-2486" && echo "Accepted" || (echo "Unaccepted"; exit 1)
  test-windows:
    needs: comiple-windows
    runs-on: ${{ matrix.os }}
    steps:
      - name: Run test1
        run: if (echo "5" | ./walawala | Select-String "10") { "Accepted" } else { "Unaccepted"; exit 1 }
      - name: Run test2
        run: if (echo "0" | ./walawala | Select-String "0") { "Accepted" } else { "Unaccepted"; exit 1 }
      - name: Run test3
        run: if (echo "-1243" | ./walawala | Select-String "-2486") { "Accepted" } else { "Unaccepted"; exit 1 }
